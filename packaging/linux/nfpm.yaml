name: "billy-desktop"
arch: ${GOARCH}
platform: "linux"
version: ${VERSION}
section: "default"
priority: "extra"
maintainer: "Jonathan Forrider <jd4rider@gmail.com>"
description: "Local AI coding assistant desktop app with bundled Billy CLI"
vendor: "JD4Codes"
homepage: "https://billysh.online"
license: "MIT"
release: "1"

contents:
  - src: ${GUI_BINARY}
    dst: /opt/billy/Billy
    file_info:
      mode: 0755
  - src: ${CLI_BINARY}
    dst: /usr/local/bin/billy
    file_info:
      mode: 0755
  - src: ./build/appicon.png
    dst: /usr/share/icons/hicolor/128x128/apps/billy.png
  - src: ./packaging/linux/billy.desktop
    dst: /usr/share/applications/billy.desktop

depends:
  - libgtk-3-0
  - libwebkit2gtk-4.1-0

overrides:
  rpm:
    depends:
      - gtk3
      - webkit2gtk4.1
  archlinux:
    depends:
      - gtk3
      - webkit2gtk-4.1
